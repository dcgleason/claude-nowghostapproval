<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnings — The Now Ghost</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Page header */
    .learnings-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .learnings-header h1 { font-size: 24px; font-weight: 700; flex: 1; }

    /* Main tabs */
    .view-tabs { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
    .view-tab {
      padding: 10px 22px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #6b7280;
      transition: all .15s;
    }
    .view-tab:hover { border-color: #0a66c2; color: #0a66c2; }
    .view-tab.active-virality { border-color: #0a66c2; background: #0a66c2; color: #fff; }
    .view-tab.active-conversion { border-color: #16a34a; background: #16a34a; color: #fff; }
    .view-tab.active-winners { border-color: #f59e0b; background: #f59e0b; color: #fff; }

    /* Stat cards */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px 20px; }
    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #9ca3af; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; color: #111; line-height: 1; }
    .stat-sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .stat-card.blue .stat-value { color: #0a66c2; }
    .stat-card.green .stat-value { color: #16a34a; }
    .stat-card.amber .stat-value { color: #d97706; }
    .stat-card.purple .stat-value { color: #7c3aed; }

    /* 2-col layout */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    /* Bar chart section */
    .bar-section { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px 22px; }
    .bar-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #9ca3af;
      margin-bottom: 16px;
    }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label { font-size: 13px; color: #374151; font-weight: 500; min-width: 130px; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .bar-track { flex: 1; height: 10px; background: #f3f4f6; border-radius: 5px; overflow: hidden; min-width: 0; }
    .bar-fill { height: 100%; border-radius: 5px; background: #0a66c2; transition: width .5s ease; min-width: 4px; }
    .bar-fill.green { background: #16a34a; }
    .bar-fill.amber { background: #f59e0b; }
    .bar-fill.purple { background: #7c3aed; }
    .bar-value { font-size: 13px; font-weight: 700; color: #111; width: 46px; text-align: right; flex-shrink: 0; }
    .bar-count { font-size: 12px; color: #9ca3af; width: 50px; flex-shrink: 0; }

    /* Signal breakdown */
    .signal-section { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px 22px; margin-bottom: 24px; }
    .signal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .signal-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 18px; }
    .signal-card-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .signal-card-count { font-size: 26px; font-weight: 800; line-height: 1; }
    .signal-card.dms .signal-card-count { color: #6366f1; }
    .signal-card.connections .signal-card-count { color: #06b6d4; }
    .signal-card.meeting .signal-card-count { color: #f59e0b; }
    .signal-card.lead .signal-card-count { color: #16a34a; }
    .signal-card.deal .signal-card-count { color: #dc2626; }

    /* Post cards */
    .posts-section { margin-top: 28px; }
    .posts-section-title { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 16px; }
    .perf-posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .perf-post-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .15s;
    }
    .perf-post-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .perf-post-card.winner { border-color: #fbbf24; }
    .perf-post-preview { font-size: 13px; color: #374151; line-height: 1.6; }
    .perf-post-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .perf-client-chip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; background: #eff6ff; color: #1d4ed8; }
    .perf-tag-chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #f3f4f6; color: #6b7280; }
    .perf-post-footer { display: flex; align-items: center; justify-content: space-between; }
    .star-display { color: #f59e0b; font-size: 14px; letter-spacing: 1px; }
    .star-display.empty { color: #e5e7eb; }
    .signal-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
    .signal-badge.dms { background: #ede9fe; color: #6d28d9; }
    .signal-badge.connections { background: #cffafe; color: #0e7490; }
    .signal-badge.meeting { background: #fef9c3; color: #854d0e; }
    .signal-badge.lead { background: #dcfce7; color: #15803d; }
    .signal-badge.deal { background: #fee2e2; color: #991b1b; }

    /* Empty state */
    .learnings-empty {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 60px 32px;
      text-align: center;
    }
    .learnings-empty h3 { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .learnings-empty p { font-size: 14px; color: #6b7280; max-width: 400px; margin: 0 auto 20px; line-height: 1.6; }
    .learnings-empty .steps { display: flex; flex-direction: column; gap: 10px; max-width: 360px; margin: 0 auto; text-align: left; }
    .learnings-empty .step { display: flex; gap: 12px; align-items: flex-start; font-size: 13px; color: #374151; }
    .learnings-empty .step-num { width: 22px; height: 22px; border-radius: 50%; background: #0a66c2; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

    @media (max-width: 700px) {
      .learnings-header h1 { font-size: 20px; }
      .view-tabs { gap: 6px; }
      .view-tab { padding: 9px 16px; font-size: 13px; flex: 1; text-align: center; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 22px; }
      /* Bar labels: shrink on mobile */
      .bar-label { min-width: 80px; max-width: 80px; font-size: 12px; }
      .bar-count { width: 36px; font-size: 11px; }
      .signal-grid { grid-template-columns: repeat(2, 1fr); }
      .perf-posts-grid { grid-template-columns: 1fr; }
      .learnings-empty { padding: 40px 20px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><span class="nav-brand-icon">👻</span> The Now Ghost</div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="nav-links">
      <a href="index.html">Posts</a>
      <a href="ideas.html">Ideas</a>
      <a href="clients.html">Clients</a>
      <a href="calendar.html">Calendar</a>
      <a href="analytics.html">Analytics</a>
      <a href="learnings.html" class="active">Learnings</a>
      <a href="intel.html">Intel</a>
      <a href="prompts.html">Prompts</a>
      <a href="post-new.html" class="btn btn-primary btn-sm">+ New Post</a>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="learnings-header">
      <h1>Learnings</h1>
      <span style="font-size:13px;color:#9ca3af">What's working across all clients</span>
    </div>

    <div class="view-tabs">
      <button class="view-tab active-virality" data-view="virality">📈 Virality</button>
      <button class="view-tab" data-view="conversion">🎯 Conversion</button>
      <button class="view-tab" data-view="winners">⭐ Winners</button>
    </div>

    <div id="mainContent"><div class="loading">Loading learnings…</div></div>
  </main>

  <script src="app.js"></script>
  <script>
    checkAuth();
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    let data = null;
    let currentView = 'virality';

    const SIGNAL_META = {
      dms:         { label: '💬 DMs received',        css: 'dms' },
      connections: { label: '🤝 Connection requests',  css: 'connections' },
      meeting:     { label: '📅 Meeting booked',       css: 'meeting' },
      lead:        { label: '🎯 Lead generated',       css: 'lead' },
      deal:        { label: '🏆 Deal closed',          css: 'deal' },
    };

    async function init() {
      data = await apiFetch('/api/learnings');
      renderView();
    }

    document.querySelector('.view-tabs').addEventListener('click', e => {
      const tab = e.target.closest('[data-view]');
      if (!tab) return;
      currentView = tab.dataset.view;
      document.querySelectorAll('.view-tab').forEach(t => {
        t.className = 'view-tab';
        if (t.dataset.view === currentView) t.classList.add(`active-${currentView}`);
      });
      renderView();
    });

    function renderView() {
      if (!data) return;
      const s = data.summary;
      const hasViralData = parseInt(s.total_rated) > 0;
      const hasConvData = parseInt(s.total_conversions) > 0;

      if (currentView === 'virality') renderVirality(s, hasViralData);
      else if (currentView === 'conversion') renderConversion(s, hasConvData);
      else renderWinners(s);
    }

    // ── Virality view ──────────────────────────────────────────────────────────

    function renderVirality(s, hasData) {
      if (!hasData) {
        document.getElementById('mainContent').innerHTML = emptyState('virality');
        return;
      }
      const v = data.virality;
      const maxRating = 5;

      document.getElementById('mainContent').innerHTML = `
        <div class="stats-row">
          <div class="stat-card blue">
            <div class="stat-label">Posts Rated</div>
            <div class="stat-value">${s.total_rated}</div>
            <div class="stat-sub">of ${s.total_posted} published</div>
          </div>
          <div class="stat-card amber">
            <div class="stat-label">Avg Rating</div>
            <div class="stat-value">${s.avg_virality || '—'}</div>
            <div class="stat-sub">out of 5</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-label">Best Hook</div>
            <div class="stat-value" style="font-size:15px;line-height:1.3">${v.by_hook[0]?.label || '—'}</div>
            <div class="stat-sub">${v.by_hook[0] ? `${v.by_hook[0].avg_rating} avg rating` : ''}</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-label">Best Format</div>
            <div class="stat-value" style="font-size:15px;line-height:1.3">${v.by_format[0]?.label || '—'}</div>
            <div class="stat-sub">${v.by_format[0] ? `${v.by_format[0].avg_rating} avg rating` : ''}</div>
          </div>
        </div>

        <div class="two-col">
          ${barSection('Hook Types', v.by_hook, 'label', 'avg_rating', maxRating, r => `${r.avg_rating}★`, r => `${r.count} post${r.count != 1 ? 's' : ''}`)}
          ${barSection('Formats', v.by_format, 'label', 'avg_rating', maxRating, r => `${r.avg_rating}★`, r => `${r.count} post${r.count != 1 ? 's' : ''}`)}
        </div>

        ${v.by_cta.length ? `
        <div style="margin-bottom:24px">
          ${barSection('Call to Action', v.by_cta, 'label', 'avg_rating', maxRating, r => `${r.avg_rating}★`, r => `${r.count} post${r.count != 1 ? 's' : ''}`)}
        </div>` : ''}

        ${v.top_posts.length ? `
        <div class="posts-section">
          <div class="posts-section-title">Top Performers <span style="font-size:13px;font-weight:400;color:#9ca3af">— rated 4 or 5 stars</span></div>
          <div class="perf-posts-grid">${v.top_posts.map(p => postCard(p, 'virality')).join('')}</div>
        </div>` : ''}
      `;
    }

    // ── Conversion view ────────────────────────────────────────────────────────

    function renderConversion(s, hasData) {
      if (!hasData) {
        document.getElementById('mainContent').innerHTML = emptyState('conversion');
        return;
      }
      const c = data.conversion;
      const totalPosted = parseInt(s.total_posted);
      const totalConv = parseInt(s.total_conversions);
      const convRate = totalPosted > 0 ? Math.round((totalConv / totalPosted) * 100) : 0;

      const bestHook = c.by_hook.find(r => parseInt(r.conversions) > 0);
      const bestFormat = c.by_format.find(r => parseInt(r.conversions) > 0);
      const maxRate = Math.max(...c.by_hook.concat(c.by_format).map(r => conversionRate(r))) || 1;

      document.getElementById('mainContent').innerHTML = `
        <div class="stats-row">
          <div class="stat-card green">
            <div class="stat-label">Conversion Signals</div>
            <div class="stat-value">${totalConv}</div>
            <div class="stat-sub">total recorded</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Conversion Rate</div>
            <div class="stat-value">${convRate}%</div>
            <div class="stat-sub">of posted content</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Best Hook</div>
            <div class="stat-value" style="font-size:15px;line-height:1.3">${bestHook?.label || '—'}</div>
            <div class="stat-sub">${bestHook ? `${Math.round(conversionRate(bestHook))}% conversion` : ''}</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Best Format</div>
            <div class="stat-value" style="font-size:15px;line-height:1.3">${bestFormat?.label || '—'}</div>
            <div class="stat-sub">${bestFormat ? `${Math.round(conversionRate(bestFormat))}% conversion` : ''}</div>
          </div>
        </div>

        ${c.signal_breakdown.length ? `
        <div class="signal-section">
          <div class="bar-section-title">Conversion Signal Breakdown</div>
          <div class="signal-grid">
            ${c.signal_breakdown.map(r => {
              const m = SIGNAL_META[r.signal] || { label: r.signal, css: '' };
              return `<div class="signal-card ${m.css}">
                <div class="signal-card-label">${m.label}</div>
                <div class="signal-card-count">${r.count}</div>
              </div>`;
            }).join('')}
          </div>
        </div>` : ''}

        <div class="two-col">
          ${barSection('Hook Types', c.by_hook.filter(r => parseInt(r.conversions) > 0), 'label', null, maxRate,
            r => `${Math.round(conversionRate(r))}%`,
            r => `${r.conversions}/${r.total}`,
            r => conversionRate(r), 'green')}
          ${barSection('Formats', c.by_format.filter(r => parseInt(r.conversions) > 0), 'label', null, maxRate,
            r => `${Math.round(conversionRate(r))}%`,
            r => `${r.conversions}/${r.total}`,
            r => conversionRate(r), 'green')}
        </div>

        ${c.top_posts.length ? `
        <div class="posts-section">
          <div class="posts-section-title">Best Converters</div>
          <div class="perf-posts-grid">${c.top_posts.map(p => postCard(p, 'conversion')).join('')}</div>
        </div>` : ''}
      `;
    }

    // ── Winners view ───────────────────────────────────────────────────────────

    function renderWinners(s) {
      const w = data.winners;
      if (!w.length) {
        document.getElementById('mainContent').innerHTML = emptyState('winners');
        return;
      }
      document.getElementById('mainContent').innerHTML = `
        <div style="margin-bottom:20px">
          <p style="font-size:14px;color:#6b7280">${w.length} starred post${w.length !== 1 ? 's' : ''} — your reference library of what works.</p>
        </div>
        <div class="perf-posts-grid">${w.map(p => postCard(p, 'winner')).join('')}</div>
      `;
    }

    // ── Helpers ────────────────────────────────────────────────────────────────

    function conversionRate(r) {
      return parseInt(r.total) > 0 ? (parseInt(r.conversions) / parseInt(r.total)) * 100 : 0;
    }

    function barSection(title, rows, labelKey, valueKey, maxVal, valueFn, countFn, customValueFn, colorClass = '') {
      if (!rows.length) return `<div class="bar-section"><div class="bar-section-title">${title}</div><div style="color:#9ca3af;font-size:13px;text-align:center;padding:20px 0">No data yet</div></div>`;
      return `
        <div class="bar-section">
          <div class="bar-section-title">${title}</div>
          ${rows.map(r => {
            const val = customValueFn ? customValueFn(r) : parseFloat(r[valueKey]);
            const pct = Math.min((val / maxVal) * 100, 100);
            return `<div class="bar-row">
              <div class="bar-label" title="${escHtml(r[labelKey])}">${escHtml(r[labelKey])}</div>
              <div class="bar-track"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div>
              <div class="bar-value">${valueFn(r)}</div>
              <div class="bar-count">${countFn(r)}</div>
            </div>`;
          }).join('')}
        </div>`;
    }

    function postCard(p, mode) {
      const stars = p.virality_rating
        ? `<span class="star-display">${'★'.repeat(p.virality_rating)}${'☆'.repeat(5 - p.virality_rating)}</span>`
        : `<span class="star-display empty">☆☆☆☆☆</span>`;
      const signal = p.conversion_signal && SIGNAL_META[p.conversion_signal]
        ? `<span class="signal-badge ${SIGNAL_META[p.conversion_signal].css}">${SIGNAL_META[p.conversion_signal].label}</span>`
        : '';
      const isWinner = p.is_winner ? '⭐ ' : '';
      return `
        <div class="perf-post-card${p.is_winner ? ' winner' : ''}">
          <div class="perf-post-preview">${isWinner}${escHtml(p.content.slice(0, 140))}${p.content.length > 140 ? '…' : ''}</div>
          <div class="perf-post-meta">
            <span class="perf-client-chip">${escHtml(p.client_name)}</span>
            ${p.tag_format ? `<span class="perf-tag-chip">${escHtml(p.tag_format)}</span>` : ''}
            ${p.tag_hook ? `<span class="perf-tag-chip">${escHtml(p.tag_hook)}</span>` : ''}
          </div>
          ${p.performance_notes ? `<div style="font-size:12px;color:#6b7280;font-style:italic">"${escHtml(p.performance_notes)}"</div>` : ''}
          <div class="perf-post-footer">
            <div style="display:flex;align-items:center;gap:8px">${stars}${signal}</div>
            <a href="post-detail.html?id=${p.id}#performance" class="btn btn-sm btn-ghost" style="font-size:12px">View →</a>
          </div>
        </div>`;
    }

    function emptyState(view) {
      const configs = {
        virality: {
          title: 'No virality data yet',
          desc: 'Start rating your published posts to see what formats and hooks spread best.',
          steps: [
            'Publish a post to LinkedIn',
            'Open the post in detail view',
            'Set Format + Hook tags, then rate virality (1–5 stars)',
            'Patterns will appear here as you log more posts',
          ],
        },
        conversion: {
          title: 'No conversion signals yet',
          desc: 'Log conversion outcomes after publishing — DMs, meetings, leads, deals.',
          steps: [
            'Publish a post to LinkedIn',
            'When it generates a response (DM, meeting), open the post',
            'Log the conversion signal in the Performance section',
            'Patterns will appear here as you log more',
          ],
        },
        winners: {
          title: 'No starred posts yet',
          desc: "Star your best posts as Winners — they'll appear here as a reference library.",
          steps: [
            'Open any published post',
            'Check ⭐ Star as Winner in the Performance section',
            'Save Performance',
            'That post will appear in your Winners Library',
          ],
        },
      };
      const c = configs[view];
      return `
        <div class="learnings-empty">
          <h3>${c.title}</h3>
          <p>${c.desc}</p>
          <div class="steps">
            ${c.steps.map((s, i) => `<div class="step"><div class="step-num">${i+1}</div><div>${s}</div></div>`).join('')}
          </div>
          <div style="margin-top:24px">
            <a href="index.html" class="btn btn-primary btn-sm">Go to Posts</a>
          </div>
        </div>`;
    }

    init();
  </script>
  <!-- Mobile nav -->
  <div class="nav-mobile-overlay" id="mobileOverlay"></div>
  <div class="nav-mobile-menu" id="mobileMenu">
    <div class="nav-mobile-header">
      <div class="nav-mobile-brand"><span>👻</span> The Now Ghost</div>
      <button class="nav-mobile-close" id="mobileClose">✕</button>
    </div>
    <div class="nav-mobile-links" id="mobileLinksCopy"></div>
    <div class="nav-mobile-footer">
      <a href="post-new.html" class="btn btn-primary">+ New Post</a>
      <button id="mobileLogoutBtn" class="btn btn-secondary">Logout</button>
    </div>
  </div>
  <script>
    (function() {
      var overlay = document.getElementById('mobileOverlay');
      var menu = document.getElementById('mobileMenu');
      var open = document.getElementById('navHamburger');
      var close = document.getElementById('mobileClose');
      var logoutBtns = [document.getElementById('logoutBtn'), document.getElementById('mobileLogoutBtn')];

      // Clone desktop nav links (excluding buttons) into mobile menu
      var desktopLinks = document.querySelectorAll('.nav-links a:not(.btn)');
      var mobileLinksEl = document.getElementById('mobileLinksCopy');
      desktopLinks.forEach(function(a) { mobileLinksEl.appendChild(a.cloneNode(true)); });

      function openMenu() { menu.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
      function closeMenu() { menu.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = ''; }
      if (open) open.addEventListener('click', openMenu);
      if (close) close.addEventListener('click', closeMenu);
      overlay.addEventListener('click', closeMenu);
      logoutBtns.forEach(function(b) { if (b) b.addEventListener('click', function() { fetch('/auth/logout',{method:'POST'}).then(function(){window.location.href='/login.html';}); }); });
    })();
  </script>
</body>
</html>
