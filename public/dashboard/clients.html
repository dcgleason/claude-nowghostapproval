<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients — The Now Ghost</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><span class="nav-brand-icon">👻</span> The Now Ghost</div>
    <div class="nav-links">
      <a href="index.html">Posts</a>
      <a href="clients.html" class="active">Clients</a>
      <a href="analytics.html">Analytics</a>
      <a href="intel.html">Intel</a>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Clients</h1>
      <button class="btn btn-primary" onclick="showAddModal()">+ Add Client</button>
    </div>

    <div id="statusMsg" class="status-msg" style="display:none"></div>
    <div id="clientsList" class="clients-grid">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2 id="modalTitle">Add Client</h2>
      <form id="clientForm">
        <input type="hidden" id="editClientId">
        <div class="form-group">
          <label for="clientName">Name</label>
          <input type="text" id="clientName" required placeholder="Jane Smith">
        </div>
        <div class="form-group">
          <label for="clientEmail">Email</label>
          <input type="email" id="clientEmail" required placeholder="jane@example.com">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth();

    // Show status from URL params (e.g. after LinkedIn connect)
    const urlParams = new URLSearchParams(location.search);
    const statusEl = document.getElementById('statusMsg');
    if (urlParams.get('connected')) {
      statusEl.textContent = '✅ LinkedIn connected successfully!';
      statusEl.className = 'status-msg success';
      statusEl.style.display = 'block';
    } else if (urlParams.get('error')) {
      statusEl.textContent = '❌ LinkedIn connection failed: ' + urlParams.get('error');
      statusEl.className = 'status-msg error';
      statusEl.style.display = 'block';
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    async function loadClients() {
      const clients = await apiFetch('/api/clients');
      const list = document.getElementById('clientsList');
      if (!clients.length) {
        list.innerHTML = '<div class="empty-state"><p>No clients yet.</p></div>';
        return;
      }
      list.innerHTML = clients.map(c => {
        const tokenExpiry = c.linkedin_token_expires_at ? new Date(c.linkedin_token_expires_at) : null;
        const daysLeft = tokenExpiry ? Math.ceil((tokenExpiry - Date.now()) / 86400000) : null;
        const connected = !!c.linkedin_person_urn;
        return `
          <div class="client-card">
            <div class="client-info">
              <div class="client-name">${escHtml(c.name)}</div>
              <div class="client-email">${escHtml(c.email)}</div>
            </div>
            <div class="client-linkedin">
              ${connected
                ? `<span class="connected">✓ LinkedIn connected</span>
                   ${daysLeft !== null && daysLeft < 7 ? `<span class="warning"> ⚠️ Expires in ${daysLeft}d</span>` : ''}
                   <button class="btn btn-sm btn-ghost" onclick="disconnect(${c.id})">Disconnect</button>`
                : `<a href="/linkedin/connect?client_id=${c.id}" class="btn btn-sm btn-secondary" title="Connect while you're on their machine">Connect LinkedIn</a>
                   <button class="btn btn-sm btn-ghost" onclick="sendAuthEmail(${c.id}, '${escHtml(c.name)}')" title="Send client a link to connect remotely">✉️ Send Auth Email</button>`
              }
            </div>
            <div class="client-actions">
              <button class="btn btn-sm btn-ghost" onclick="editClient(${c.id}, '${escHtml(c.name)}', '${escHtml(c.email)}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteClient(${c.id})">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = 'Add Client';
      document.getElementById('editClientId').value = '';
      document.getElementById('clientName').value = '';
      document.getElementById('clientEmail').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function editClient(id, name, email) {
      document.getElementById('modalTitle').textContent = 'Edit Client';
      document.getElementById('editClientId').value = id;
      document.getElementById('clientName').value = name;
      document.getElementById('clientEmail').value = email;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    document.getElementById('clientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editClientId').value;
      const body = {
        name: document.getElementById('clientName').value,
        email: document.getElementById('clientEmail').value,
      };
      if (id) {
        await apiFetch(`/api/clients/${id}`, { method: 'PUT', body });
      } else {
        await apiFetch('/api/clients', { method: 'POST', body });
      }
      closeModal();
      loadClients();
    });

    async function deleteClient(id) {
      if (!confirm('Delete this client and all their posts?')) return;
      await apiFetch(`/api/clients/${id}`, { method: 'DELETE' });
      loadClients();
    }

    async function disconnect(id) {
      if (!confirm('Disconnect this client\'s LinkedIn account?')) return;
      await apiFetch(`/linkedin/disconnect/${id}`, { method: 'POST' });
      loadClients();
    }

    async function sendAuthEmail(id, name) {
      if (!confirm(`Send ${name} an email with a link to connect their LinkedIn account?`)) return;
      const statusEl = document.getElementById('statusMsg');
      try {
        const result = await apiFetch(`/api/clients/${id}/send-linkedin-auth`, { method: 'POST' });
        statusEl.textContent = `✅ Auth email sent to ${name}! The link expires in 48 hours.`;
        statusEl.className = 'status-msg success';
        if (result.emailWarning) {
          statusEl.textContent += ` (Warning: ${result.emailWarning})`;
        }
      } catch (err) {
        statusEl.textContent = `❌ Failed to send auth email: ${err.message || 'Server error'}`;
        statusEl.className = 'status-msg error';
      }
      statusEl.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadClients();
  </script>
</body>
</html>
