<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients — The Now Ghost</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><span class="nav-brand-icon">👻</span> The Now Ghost</div>
    <div class="nav-links">
      <a href="index.html">Posts</a>
      <a href="clients.html" class="active">Clients</a>
      <a href="calendar.html">Calendar</a>
      <a href="analytics.html">Analytics</a>
      <a href="intel.html">Intel</a>
      <a href="prompts.html">Prompts</a>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Clients</h1>
      <button class="btn btn-primary" onclick="showAddModal()">+ Add Client</button>
    </div>

    <div id="statusMsg" class="status-msg" style="display:none"></div>
    <div id="clientsList" class="clients-grid">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:520px">
      <h2 id="modalTitle">Add Client</h2>
      <form id="clientForm">
        <input type="hidden" id="editClientId">
        <div class="form-group">
          <label for="clientName">Name</label>
          <input type="text" id="clientName" required placeholder="Jane Smith">
        </div>
        <div class="form-group">
          <label for="clientEmail">Email</label>
          <input type="email" id="clientEmail" required placeholder="jane@example.com">
        </div>
        <hr style="margin:20px 0 16px">
        <p style="font-size:13px;font-weight:600;color:#374151;margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em">Voice Profile</p>
        <div class="form-group">
          <label for="clientVoiceTone">Tone / Style</label>
          <select id="clientVoiceTone">
            <option value="">— Not set —</option>
            <option value="Professional &amp; Authoritative">Professional &amp; Authoritative</option>
            <option value="Conversational &amp; Approachable">Conversational &amp; Approachable</option>
            <option value="Executive / C-Suite">Executive / C-Suite</option>
            <option value="Technical Expert">Technical Expert</option>
            <option value="Thought Leader">Thought Leader</option>
            <option value="Sales-Focused">Sales-Focused</option>
          </select>
        </div>
        <div class="form-group">
          <label for="clientPillars">Content Pillars <span style="font-weight:400;color:#9ca3af">(comma-separated topics)</span></label>
          <input type="text" id="clientPillars" placeholder="e.g. ServiceNow GRC, ITSM, digital transformation">
        </div>
        <div class="form-group">
          <label for="clientAvoid">Topics to Avoid</label>
          <input type="text" id="clientAvoid" placeholder="e.g. competitor names, pricing, politics">
        </div>
        <div class="form-group">
          <label for="clientNotes">Notes</label>
          <textarea id="clientNotes" rows="3" placeholder="Anything else — client preferences, examples they liked, context…"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth();

    // Show status from URL params (e.g. after LinkedIn connect)
    const urlParams = new URLSearchParams(location.search);
    const statusEl = document.getElementById('statusMsg');
    if (urlParams.get('connected')) {
      statusEl.textContent = '✅ LinkedIn connected successfully!';
      statusEl.className = 'status-msg success';
      statusEl.style.display = 'block';
    } else if (urlParams.get('error')) {
      statusEl.textContent = '❌ LinkedIn connection failed: ' + urlParams.get('error');
      statusEl.className = 'status-msg error';
      statusEl.style.display = 'block';
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    let allClients = [];
    async function loadClients() {
      const clients = await apiFetch('/api/clients');
      allClients = clients;
      const list = document.getElementById('clientsList');
      if (!clients.length) {
        list.innerHTML = '<div class="empty-state"><p>No clients yet.</p></div>';
        return;
      }
      list.innerHTML = clients.map(c => {
        const tokenExpiry = c.linkedin_token_expires_at ? new Date(c.linkedin_token_expires_at) : null;
        const daysLeft = tokenExpiry ? Math.ceil((tokenExpiry - Date.now()) / 86400000) : null;
        const connected = !!c.linkedin_person_urn;
        return `
          <div class="client-card">
            <div class="client-info">
              <div class="client-name">${escHtml(c.name)}</div>
              <div class="client-email">${escHtml(c.email)}</div>
              ${c.voice_tone ? `<div style="font-size:12px;color:#6b7280;margin-top:3px">🎙 ${escHtml(c.voice_tone)}</div>` : ''}
              ${c.content_pillars ? `<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">${c.content_pillars.split(',').map(p => `<span style="background:#eff6ff;color:#1d4ed8;font-size:11px;padding:2px 7px;border-radius:999px">${escHtml(p.trim())}</span>`).join('')}</div>` : ''}
            </div>
            <div class="client-linkedin">
              ${connected
                ? `<span class="connected">✓ LinkedIn connected</span>
                   ${daysLeft !== null && daysLeft < 7 ? `<span class="warning"> ⚠️ Expires in ${daysLeft}d</span>` : ''}
                   <button class="btn btn-sm btn-ghost" onclick="disconnect(${c.id})">Disconnect</button>`
                : `<a href="/linkedin/connect?client_id=${c.id}" class="btn btn-sm btn-secondary" title="Connect while you're on their machine">Connect LinkedIn</a>
                   <button class="btn btn-sm btn-ghost" onclick="sendAuthEmail(${c.id}, '${escHtml(c.name)}')" title="Send client a link to connect remotely">✉️ Send Auth Email</button>`
              }
            </div>
            <div class="client-actions">
              <a href="client-detail.html?id=${c.id}" class="btn btn-sm btn-secondary">Knowledge Base</a>
              <button class="btn btn-sm btn-ghost" onclick="editClient(${c.id})">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteClient(${c.id})">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function clearModal() {
      ['editClientId','clientName','clientEmail','clientPillars','clientAvoid','clientNotes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('clientVoiceTone').value = '';
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = 'Add Client';
      clearModal();
      document.getElementById('modal').style.display = 'flex';
    }

    function editClient(id) {
      const c = allClients.find(x => x.id === id);
      if (!c) return;
      document.getElementById('modalTitle').textContent = 'Edit Client';
      document.getElementById('editClientId').value = c.id;
      document.getElementById('clientName').value = c.name;
      document.getElementById('clientEmail').value = c.email;
      document.getElementById('clientVoiceTone').value = c.voice_tone || '';
      document.getElementById('clientPillars').value = c.content_pillars || '';
      document.getElementById('clientAvoid').value = c.topics_to_avoid || '';
      document.getElementById('clientNotes').value = c.notes || '';
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    document.getElementById('clientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editClientId').value;
      const body = {
        name: document.getElementById('clientName').value,
        email: document.getElementById('clientEmail').value,
        voice_tone: document.getElementById('clientVoiceTone').value || null,
        content_pillars: document.getElementById('clientPillars').value || null,
        topics_to_avoid: document.getElementById('clientAvoid').value || null,
        notes: document.getElementById('clientNotes').value || null,
      };
      if (id) {
        await apiFetch(`/api/clients/${id}`, { method: 'PUT', body });
      } else {
        await apiFetch('/api/clients', { method: 'POST', body });
      }
      closeModal();
      loadClients();
    });

    async function deleteClient(id) {
      if (!confirm('Delete this client and all their posts?')) return;
      await apiFetch(`/api/clients/${id}`, { method: 'DELETE' });
      loadClients();
    }

    async function disconnect(id) {
      if (!confirm('Disconnect this client\'s LinkedIn account?')) return;
      await apiFetch(`/linkedin/disconnect/${id}`, { method: 'POST' });
      loadClients();
    }

    async function sendAuthEmail(id, name) {
      if (!confirm(`Send ${name} an email with a link to connect their LinkedIn account?`)) return;
      const statusEl = document.getElementById('statusMsg');
      try {
        const result = await apiFetch(`/api/clients/${id}/send-linkedin-auth`, { method: 'POST' });
        statusEl.textContent = `✅ Auth email sent to ${name}! The link expires in 48 hours.`;
        statusEl.className = 'status-msg success';
        if (result.emailWarning) {
          statusEl.textContent += ` (Warning: ${result.emailWarning})`;
        }
      } catch (err) {
        statusEl.textContent = `❌ Failed to send auth email: ${err.message || 'Server error'}`;
        statusEl.className = 'status-msg error';
      }
      statusEl.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadClients();
  </script>
</body>
</html>
